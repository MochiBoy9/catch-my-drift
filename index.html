<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ayo this got stick drift?</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            .hud-btn {fill: #111827; stroke: #374151; stroke-width: 2; transition: fill 0.1s ease, stroke 0.1s ease; }
            .hud-btn.active {fill: #6366f1; stroke: #818cf8; filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6)); }
            .hud-stick {fill: #374151; stroke: #4b5563; stroke-width: 1.5;}
            .hud-stick.active {fill: #6366f1; stroke:#818cf8; filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6)); }
            .hud-stick-drift {fill: #fbbf24; stroke: #fbbf24; filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6)); }
            .hud-trigger-bar {fill: #6366f1; transform-origin: left; transition: transform 0.05s linear;}
        </style>
    </head>
    <body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-400 mb-2">ayo this got stick drift???</h1>
            <p class="text-gray-400">connect a controller and press a button</p>
        </header>
        <div id="status" class="bg-gray-900 border border-red-500/30 text-red-400 px-6 py-3 rounded-xl mb-8 font-semibold shadow-lg transition-all">
            no controller found brah
        </div>
        <main id="controller-display" class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8 hidden">
            <div class="w-full bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl flex justify-center relative overflow-hidden">
                <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(#4f46e5 1px, transparent 1px), linear-gradient(90deg, #4f46e5 1px, transparent 1px); background-size: 20px 20px;"></div>

                <svg viewBox="0 0 800 400" class="w-full max-w-2xl relative z-10">
                    <path d="M 150 100 C 50 100, 20 180, 50 280 C 70 340, 120 350, 160 300 C 180 270, 250 220, 400 220 C 550 220, 620 270, 640 300 C 680 350, 730 340, 750 280 C 780 180, 750 100, 650 100 Z" fill="#030712" stroke="#1f2937" stroke-width="4" stroke-linejoin="round"/>
                  
                    <path id="svg-btn-4" d="M 160 95 C 160 70, 250 65, 290 80 L 290 95 Z" class="hud-btn" />
                    <path id="svg-btn-5" d="M 640 95 C 640 70, 550 65, 510 80 L 510 95 Z" class="hud-btn" />

                    <g transform="translate(160,35)">
                        <rect width="100" height="20" rx="3" fill="#111827" stroke="#1f2937" stroke-width="2" />
                        <rect id="svg-trig-6" width="100" height="20" rx="3" class="hud-trigger-bar" transform="scale(0, 1)"/>
                        <text x="-45" y="15" fill="#4b5563" class="font-mono text-xs font-bold">LT (B6)</text>
                    </g>
                    <g transform="translate(240, 220)">
                        <rect width="100" height="20" rx="3" fill="#111827" stroke="#1f2937" stroke-width="2" />
                        <rect id="svg-trig-7" width="100" height="20" rx="3" class="hud-trigger-bar" transform="scale(0, 1)"/>
                        <text x="110" y="15" fill="#4b5563" class="font-mono text-xs font-bold">RT (B7)</text>
                    </g>
                    <g transform="translate(240, 220)">
                        <rect id="svg-btn-12" x="-12" y="-36" width="24" rx="2" class="hud-btn" />
                        <rect id="svg-btn-13" x="-12" y="10" width="24" height="26" rx="2" class="hud-btn" />
                        <rect id="svg-btn-14" x="-36" y="-12" width="26" height="24" rx="2" class="hud-btn" />
                        <rect id="svg-btn-15" x="10" y="-12" width="26" height="24" rx="2" class="hud-btn" />
                        <circle cx="0" cy="0" r="12" fill="#030712"/>
                    </g>
                    <g transform="translate(560, 150)">
                        <circle id="svg-btn-3" cx="0" cy="-32" r="14" class="hud-btn" /> <text x="-4" y="-28" fill="#4b5563" class="font-bold text-xs pointer-events-none">Y</text>
                        <circle id="svg-btn-1" cx="32" cy="0" r="14" class="hud-btn" /> <text x="29" y="4" fill="#4b5563" class="font-bold text-xs pointer-events-none">B</text>
                        <circle id="svg-btn-0" cx="0" cy="32" r="14" class="hud-btn" /> <text x="-4" y="36" fill="#4b5563" class="font-bold text-xs pointer-events-none">A</text>
                        <circle id="svg-btn-2" cx="-32" cy="0" r="14" class="hud-btn" /> <text x="-36" y="4" fill="#4b5563" class="font-bold text-xs pointer-events-none">X</text>
                    </g>
                    <ellipse id="svg-btn-8" cx="360" cy="140" rx="15" ry="7" class="hud-btn" />
                    <ellipse id="svg-btn-9" cx="440" cy="140" rx="15" ry="7" class="hud-btn" />
                    <g transform="translate(200, 140)">
                        <circle cx="0" cy="0" r="40" fill="none" stroke="#1f2937" stroke-width="2"/>
                        <circle cx="0" cy="0" r="6" fill="1f2937" />
                        <circle id="svg-stick-0" cx="0" cy="0" r="22" class="hud-stick" />
                        <text x="-20" y="55" fill="#4b5563" class="font-mono text-[10px]">stick 1 (L)</text>
                    </g>

                </svg>
                
                </div>
            </div>
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl flex flex-col justify-between">
                <h2 class="text-xl font-semibold mb-4 text-indigo-300 border-b border-gray-800 pb-2">analog sticks</h2>
                <div id="axes-container" class="space-y-4">
                </div>
            </div>
            <div class="mt-6 p-4 bg-gray-950 rounded-xl border border-gray-800 text-xs text-gray-500">
                <span class="font-bold text-gray-400">controller id:</span><span id="gamepad-id"></span>
            </div>
        </main>

        <script>
            const statusDiv = document.getElementById('status');
            const displayMain = document.getElementById('controller-display');
            const buttonsContainer = document.getElementById('buttons-container');
            const axesContainer = document.getElementById('axes-container');
            const gamepadIdSpan = document.getElementById('gamepad-id');

            let gamepadIndex = null;

            window.addEventListener("gamepadconnected", (e) => {
                console.log("controller currently connected:", e.gamepad);
                gamepadIndex = e.gamepad.index;
                statusDiv.textContent = `connected: ${e.gamepad.id}`;
                statusDiv.classList.remove('border-red-500/30', 'text-red-400');
                statusDiv.classList.add('border-green-500/30', 'text-green-400');
                displayMain.classList.remove('hidden')
                setupUI(e.gamepad);
                requestAnimationFrame(updateLoop);
            });
            window.addEventListener("gamepaddisconnected", (e) => {
                console.log("controller disconnected")
                if (gamepadIndex === e.gamepad.index) {
                    gamepadIndex = null;
                    statusDiv.textContent = "no controller connected";
                    statusDiv.classList.remove('border-green-500/30', 'text-green-400');
                    statusDiv.classList.add('border-red-500/30', 'text-red-400');
                    displayMain.classList.add('hidden');
                }
            });
            function setupUI(gamepad) {
                buttonsContainer.innerHTML = '';
                axesContainer.innerHTML = '';
                gamepadIdSpan.textContent = gamepad.id;
                gamepad.buttons.forEach((button, index) => {
                    const btnDiv = document.createElement('div');
                    btnDiv.id = `btn-${index}`;
                    btnDiv.className = "flex justify-between items-center bg-gray-950 p-3 rounded-xl border border-gray-800 transition-colors";
                    btnDiv.innerHTML = `
                    <span class="text-sm font-medium text-gray-500">Btn ${index}</span>
                    <span class="val text-xs font-mono bg-gray-900 px-2 py-1 rounded border border-gray-800 text-gray-500">0.00</span>
                    `;
                    buttonsContainer.appendChild(btnDiv);
                });

                const totalSticks = Math.ceil(gamepad.axes.length / 2);
                for (let i = 0; i < totalSticks; i++) {
                    const stickDiv = document.createElement('div');
                    stickDiv.className = "bg-gray-950 p-4 rounded-xl border border-gray-800 flex flex-col items-center gap-4";
                    stickDiv.innerHTML = `
                    <div class="w-full flex justify-between text-sm font-medium text-gray-400">
                        <span>Stick ${i + 1}</span>
                        <span class="font-mono text-xs text-indigo-400">
                            X: <span id="stick-${i}-x-val">0.00</span> | Y: <span id="stick-${i}-y-val">0.00</span>
                        </span>
                    </div>
                    <div class="relative w-32 h-32 bg-gray-900 rounded-full border border-gray-800 flex items-center justify-center">
                        <div class="absolute w-full h-[1px] bg-gray-800"></div>
                        <div class="absolute h-full w-[1px] bg-gray-800"></div>
                        <div class="absolute w-6 h-6 border border-dashed border-gray-700 rounded-full"></div>
                        <div id="stick-${i}-dot" class="absolute w-4 h-4 bg-indigo-500 rounded-full shadow-lg shadow-indigo-500/50 transition-all duration-75" style="transform: translate(0px, 0px)"></div>
                    </div>
                `;
                axesContainer.appendChild(stickDiv);
            }
        }
        function updateLoop() {
            if (gamepadIndex === null) return;
            const gamepad = navigator.getGamepads()[gamepadIndex];
            if (gamepad) {
                gamepad.buttons.forEach((button, index) => {
                    const btnDiv = document.getElementById(`btn-${index}`);
                    if (btnDiv) {
                        const valSpan = btnDiv.querySelector('.val');
                        valSpan.textContent = button.value.toFixed(2);
                        if (button.pressed) {
                            btnDiv.classList.remove('bg-gray-950', 'border-gray-800');
                            btnDiv.classList.add('bg-indigo-900/20', 'border-indigo-500');
                            valSpan.classList.add('text-indigo-400', 'border-indigo-500/50');
                        } else {
                            btnDiv.classList.remove('bg-indigo-600/20', 'border-indigo-500');
                            btnDiv.classList.add('bg-gray-950', 'border-gray-800');
                            valSpan.classList.remove('text-indigo-400', 'border-indigo-500/50');
                        }
                    }
                });
                 const totalSticks = Math.ceil(gamepad.axes.length / 2);
    for (let i = 0; i < totalSticks; i++) {
        const xAxisIndex = i * 2;
        const yAxisIndex = (i * 2) + 1;
        const xValue = gamepad.axes[xAxisIndex] || 0;
        const yValue = gamepad.axes[yAxisIndex] !== undefined ? gamepad.axes[yAxisIndex] : 0;
        const xSpan = document.getElementById(`stick-${i}-x-val`);
        const ySpan = document.getElementById(`stick-${i}-y-val`);
        const dot = document.getElementById(`stick-${i}-dot`);
        if (xSpan && ySpan && dot) {
            xSpan.textContent = xValue.toFixed(2);
            ySpan.textContent = yValue.toFixed(2);
            const accuracyThreshold = 0.01;
            if (Math.abs(xValue) > accuracyThreshold || Math.abs(yValue) > accuracyThreshold) {
                dot.classList.remove('bg-indigo-500', 'shadow-indigo-500/50');
                dot.classList.add('bg-amber-400', 'shadow-amber-400/50')
                xSpan.classList.add('text-amber-400');
                ySpan.classList.add('text-amber-400');
            } else {
                dot.classList.remove('bg-amber-400', 'shadow-amber-400/50');
                dot.classList.add('bg-indigo-500', 'shadow-indigo-500/50');
                xSpan.classList.remove('text-amber-400');
                ySpan.classList.remove('text-amber-400');
            }
              const maxPixels = 56;
        const translateX = xValue * maxPixels;
        const translateY = yValue * maxPixels;
        dot.style.transform = `translate(${translateX}px, ${translateY}px)`;
            }
        }  
    }
    requestAnimationFrame(updateLoop);
}


        </script>
    </body>
</html>
