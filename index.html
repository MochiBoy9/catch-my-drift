<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>stick drif</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            .ps5-btn { 
                background-color: #1f2937; 
                mask-size: contain; 
                mask-repeat: no-repeat; 
                mask-position: center; 
                -webkit-mask-size: contain; 
                -webkit-mask-repeat: no-repeat; 
                -webkit-mask-position: center; 
                transition: background-color 0.1s ease, filter 0.1s ease; 
            }
            .ps5-btn.active { 
                background-color: #6366f1; 
                filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6)); 
            }
            
   
            .ps5-stick { 
                background-color: #374151; 
                mask-size: contain; 
                mask-repeat: no-repeat; 
                mask-position: center; 
                -webkit-mask-size: contain; 
                -webkit-mask-repeat: no-repeat; 
                -webkit-mask-position: center; 
                transition: transform 0.05s ease-out, background-color 0.1s; 
            }
            .ps5-stick.active { 
                background-color: #6366f1; 
                filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6)); 
            }
            .ps5-stick.drift { 
                background-color: #fbbf24; 
                filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6)); 
            }
        </style>
    </head>
    <body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-400 mb-2 tracking-wider">ayo this got stick drift???</h1>
            <p class="text-gray-400">connect a controller and press a button</p>
        </header>
        <div id="status" class="bg-gray-900 border border-red-500/30 text-red-400 px-6 py-3 rounded-xl mb-8 font-semibold shadow-lg transition-all">
            no controller found brah
        </div>
        <main id="controller-display" class="w-full max-w-4xl flex flex-col gap-6 hidden">   
            <div class="w-full bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl flex justify-center relative overflow-hidden min-h-[420px] items-center">
                <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(#4f46e5 1px, transparent 1px), linear-gradient(90deg, #4f46e5 1px, transparent 1px); background-size: 20px 20px;"></div>
                <div class="relative w-[560px] h-[340px] z-10 select-none">
                    
                    <div id="svg-btn-16" class="absolute left-1/2 top-[40px] -translate-x-1/2 w-[150px] h-[65px] ps5-btn opacity-90" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/touchpad.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/touchpad.svg');"></div>
                    <div class="absolute left-[20px] top-[0px] w-[110px] h-[20px] bg-gray-950 border border-gray-800 rounded flex items-center px-1">
                        <div id="svg-trig-6" class="h-[12px] bg-indigo-500 rounded-sm origin-left transition-all duration-75" style="width: 0%;"></div>
                        <span class="absolute -bottom-5 left-0 text-[10px] text-gray-500 font-mono font-bold">LT (B6)</span>
                    </div>
                    <div class="absolute right-[20px] top-[0px] w-[110px] h-[20px] bg-gray-950 border border-gray-800 rounded flex items-center px-1">
                        <div id="svg-trig-7" class="h-[12px] bg-indigo-500 rounded-sm origin-left transition-all duration-75" style="width: 0%;"></div>
                        <span class="absolute -bottom-5 right-0 text-[10px] text-gray-500 font-mono font-bold">RT (B7)</span>
                    </div>
                    <div id="svg-btn-4" class="absolute left-[30px] top-[32px] w-[95px] h-[26px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/bumper_left.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/bumper_left.svg');"></div>
                    <div id="svg-btn-5" class="absolute right-[30px] top-[32px] w-[95px] h-[26px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/bumper_right.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/bumper_right.svg');"></div>
                    <div id="svg-btn-8" class="absolute left-[165px] top-[110px] w-[18px] h-[18px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_create.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_create.svg');"></div>
                    <div id="svg-btn-9" class="absolute right-[165px] top-[110px] w-[18px] h-[18px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_options.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_options.svg');"></div>
                    <div class="absolute left-[40px] top-[110px] w-[95px] h-[95px] bg-gray-950/20 border border-gray-800/30 rounded-full flex items-center justify-center">
                        <div id="svg-btn-12" class="absolute top-0 w-[28px] h-[32px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/dpad_up.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/dpad_up.svg');"></div>
                        <div id="svg-btn-13" class="absolute bottom-0 w-[28px] h-[32px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/dpad_down.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/dpad_down.svg');"></div>
                        <div id="svg-btn-14" class="absolute left-0 w-[32px] h-[28px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/dpad_left.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/dpad_left.svg');"></div>
                        <div id="svg-btn-15" class="absolute right-0 w-[32px] h-[28px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/dpad_right.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/dpad_right.svg');"></div>
                    </div>
                    <div class="absolute right-[40px] top-[110px] w-[95px] h-[95px] bg-gray-950/20 border border-gray-800/30 rounded-full flex items-center justify-center">
                        <div id="svg-btn-3" class="absolute top-0 w-[28px] h-[28px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_triangle.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_triangle.svg');"></div>
                        <div id="svg-btn-1" class="absolute right-0 w-[28px] h-[28px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_circle.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_circle.svg');"></div>
                        <div id="svg-btn-0" class="absolute bottom-0 w-[28px] h-[28px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_cross.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_cross.svg');"></div>
                        <div id="svg-btn-2" class="absolute left-0 w-[28px] h-[28px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_square.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_square.svg');"></div>
                    </div>

                    <div class="absolute left-[165px] top-[215px] w-[80px] h-[80px] bg-gray-950 border border-gray-800 rounded-full flex items-center justify-center shadow-inner">
                        <div class="absolute w-2 h-2 bg-gray-800 rounded-full"></div>
                        <div id="svg-stick-0" class="w-[52px] h-[52px] ps5-stick z-20" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/stick_left.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/stick_left.svg');"></div>
                        <span class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[9px] text-gray-500 font-mono whitespace-nowrap">STICK 1 (L)</span>
                    </div>
                    <div class="absolute right-[165px] top-[215px] w-[80px] h-[80px] bg-gray-950 border border-gray-800 rounded-full flex items-center justify-center shadow-inner">
                        <div class="absolute w-2 h-2 bg-gray-800 rounded-full"></div>
                        <div id="svg-stick-1" class="w-[52px] h-[52px] ps5-stick z-20" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/stick_right.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/stick_right.svg');"></div>
                        <span class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[9px] text-gray-500 font-mono whitespace-nowrap">STICK 2 (R)</span>
                    </div>
                    <div id="svg-btn-10" class="absolute left-1/2 top-[230px] -translate-x-1/2 w-[24px] h-[24px] ps5-btn" style="-webkit-mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_ps.svg'); mask-image: url('https://raw.githubusercontent.com/icculus/ControllerImage/main/art/standard/gamepad/ps5/button_ps.svg');"></div>
                </div>
            </div>
            <div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 text-xs font-mono">
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-inner flex justify-between items-center">
                    <div>
                        <span class="text-indigo-400 block font-bold mb-1">Axis_L [Left Analog]</span>
                        X: <span id="stick-0-x-val" class="text-gray-400 mr-4">0.00</span>
                        Y: <span id="stick-0-y-val" class="text-gray-400">0.00</span>
                    </div>
                    <span id="stick-0-drift-status" class="text-green-500 font-bold bg-green-500/20 px-2 py-1 rounded border border-green-500/50">no drift</span>
                </div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-inner flex justify-between items-center">
                    <div>
                        <span class="text-indigo-400 block font-bold mb-1">Axis_R [Right Analog]</span>
                        X: <span id="stick-1-x-val" class="text-gray-400 mr-4">0.00</span>
                        Y: <span id="stick-1-y-val" class="text-gray-400">0.00</span>
                    </div>
                    <span id="stick-1-drift-status" class="text-green-500 font-bold bg-green-500/20 px-2 py-1 rounded border border-green-500/50">no drift</span>
                </div>
            </div>
            <div class="w-full p-4 bg-gray-950 rounded-xl border border-gray-800 text-xs text-gray-500 flex justify-between items-center font-mono">
                <div><span class="font-bold text-gray-400">controller id:</span> <span id="gamepad-id"></span></div>
                <div class="text-[10px] text-gray-600">60hz refresh rate</div>
            </div>
        </main>
        <script>
            const statusDiv = document.getElementById('status');
            const displayMain = document.getElementById('controller-display');
            const gamepadIdSpan = document.getElementById('gamepad-id');
            let gamepadIndex = null;
            window.addEventListener("gamepadconnected", (e) => {
                console.log("Gamepad connected:", e.gamepad);
                gamepadIndex = e.gamepad.index;
                statusDiv.textContent = `connected: ${e.gamepad.id.split(' (')[0]}`;
                statusDiv.classList.remove('border-red-500/30', 'text-red-400');
                statusDiv.classList.add('border-green-500/30', 'text-green-400');
                displayMain.classList.remove('hidden');

                gamepadIdSpan.textContent = e.gamepad.id;
                requestAnimationFrame(updateLoop);
            });
            window.addEventListener("gamepaddisconnected", (e) => {
                console.log("Gamepad disconnected:");
                if (gamepadIndex === e.gamepad.index) {
                    gamepadIndex = null;
                    statusDiv.textContent = "no controller found brah";
                    statusDiv.classList.remove('border-green-500/30', 'text-green-400');
                    statusDiv.classList.add('border-red-500/30', 'text-red-400');
                    displayMain.classList.add('hidden');
                }
            });
            function updateLoop() {
                if (gamepadIndex === null) return;
                const gamepad = navigator.getGamepads()[gamepadIndex]; 
                if (gamepad) {
                    gamepad.buttons.forEach((button, index) => {
                        const svgBtn = document.getElementById(`svg-btn-${index}`);
                        if (svgBtn) {
                            if (button.pressed) {
                                svgBtn.classList.add('active');
                            } else {
                                svgBtn.classList.remove('active');
                            }
                        }
                    });
                    const trigL = document.getElementById('svg-trig-6');
                    const trigR = document.getElementById('svg-trig-7');
                    if (trigL && gamepad.buttons[6]) trigL.style.width = `${gamepad.buttons[6].value * 100}%`;
                    if (trigR && gamepad.buttons[7]) trigR.style.width = `${gamepad.buttons[7].value * 100}%`;
                    const totalSticks = Math.min(2, Math.ceil(gamepad.axes.length / 2));
                    for (let i = 0; i < totalSticks; i++) {
                        const xAxisIndex = i * 2;
                        const yAxisIndex = (i * 2) + 1;
                        const xValue = gamepad.axes[xAxisIndex] || 0;
                        const yValue = gamepad.axes[yAxisIndex] !== undefined ? gamepad.axes[yAxisIndex] : 0;
                        const xSpan = document.getElementById(`stick-${i}-x-val`);
                        const ySpan = document.getElementById(`stick-${i}-y-val`);
                        const hudStickCircle = document.getElementById(`svg-stick-${i}`);
                        const statusBadge = document.getElementById(`stick-${i}-drift-status`);  
                        if (xSpan && ySpan && hudStickCircle) {
                            xSpan.textContent = xValue.toFixed(2);
                            ySpan.textContent = yValue.toFixed(2);
                            
                            const accuracyThreshold = 0.05;
                            const hasInput = Math.abs(xValue) > accuracyThreshold || Math.abs(yValue) > accuracyThreshold;
                            
                            const stickClickButton = i === 0 ? 10 : 11;
                            const isClicked = gamepad.buttons[stickClickButton]?.pressed;
                            
                            if (isClicked) {
                                hudStickCircle.classList.add('active');
                            } else {
                                hudStickCircle.classList.remove('active');
                            }
                            
                            if (hasInput) {
                                hudStickCircle.classList.add('drift');
                                if (statusBadge) {
                                    statusBadge.textContent = 'drift detected';
                                    statusBadge.className = "text-amber-500 font-bold bg-amber-500/10 px-2 py-1 rounded border border-amber-500/20";
                                }
                            } else {
                                hudStickCircle.classList.remove('drift');
                                if (statusBadge) {
                                    statusBadge.textContent = 'no drift';
                                    statusBadge.className = "text-green-500 font-bold bg-green-500/10 px-2 py-1 rounded border border-green-500/20";
                                }
                            }
                            const maxPixels = 16;
                            const translateX = xValue * maxPixels;
                            const translateY = yValue * maxPixels;
                            hudStickCircle.style.transform = `translate(${translateX}px, ${translateY}px)`;
                        }
                    }
                }
                requestAnimationFrame(updateLoop);
            }
        </script>
    </body>
</html>
